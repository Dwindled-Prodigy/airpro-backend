<div class="max-w-7xl mx-auto py-8">
  <div class="flex justify-between items-end mb-8">
      <div>
          <h1 class="text-3xl font-black text-slate-900 tracking-tight">User Management</h1>
          <p class="text-slate-500 font-medium mt-1">View and manage registered system users.</p>
      </div>
  </div>

  <div *ngIf="isLoading" class="flex justify-center items-center h-64">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700"></div>
  </div>

  <!-- Users Table -->
  <div *ngIf="!isLoading" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
              <thead>
                  <tr class="bg-slate-50 border-b border-slate-200">
                      <th class="py-4 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider">ID</th>
                      <th class="py-4 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider">Name</th>
                      <th class="py-4 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider">Email</th>
                      <th class="py-4 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider">Role</th>
                      <th class="py-4 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider">Category</th>
                      <th class="py-4 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Actions</th>
                  </tr>
              </thead>
              <tbody class="divide-y divide-slate-100">
                  <tr *ngFor="let user of users" class="hover:bg-slate-50/50 transition-colors">
                      <td class="py-4 px-6 text-sm font-semibold text-slate-600">#{{ user.id }}</td>
                      <td class="py-4 px-6 text-sm font-bold text-slate-900">{{ user.name }}</td>
                      <td class="py-4 px-6 text-sm font-medium text-slate-500">{{ user.email }}</td>
                      <td class="py-4 px-6 text-sm font-medium">
                          <span class="px-3 py-1 text-xs font-bold rounded-full" 
                                [ngClass]="user.role === 'ADMIN' ? 'bg-purple-50 text-purple-700 ring-1 ring-purple-600/20' : 'bg-slate-100 text-slate-700 ring-1 ring-slate-600/10'">
                              {{ user.role }}
                          </span>
                      </td>
                      <td class="py-4 px-6 text-sm font-medium">
                          <span class="px-3 py-1 text-xs font-bold rounded-full" 
                                [ngClass]="{
                                  'bg-amber-50 text-amber-700 ring-1 ring-amber-600/20': user.category === 'GOLD',
                                  'bg-slate-100 text-slate-700 ring-1 ring-slate-600/20': user.category === 'SILVER',
                                  'bg-blue-50 text-blue-700 ring-1 ring-blue-600/20': user.category === 'REGULAR'
                                }">
                              {{ user.category }}
                          </span>
                      </td>
                      <td class="py-4 px-6 text-right">
                          <button (click)="deleteUser(user.id)" class="text-red-400 hover:text-red-600 transition-colors p-1" title="Delete User">
                              <span class="material-symbols-outlined text-[18px]">delete</span>
                          </button>
                      </td>
                  </tr>
                  <tr *ngIf="users.length === 0">
                      <td colspan="6" class="py-12 text-center text-slate-500 font-medium">
                          No users found.
                      </td>
                  </tr>
              </tbody>
          </table>
      </div>
  </div>
</div>
